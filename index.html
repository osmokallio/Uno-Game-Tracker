<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Uno Pistelaskuri</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="bg-gray-100 p-4 space-y-4">
<h1 class="text-2xl font-bold">Uno Pistelaskuri</h1>
<section id="setup" class="space-y-2">
  <h2>Aseta Pelaajat</h2>
  <label class="block">Nimet (pilkuilla):
    <input id="names" class="border p-1 w-full" placeholder="Liisa, Matti">
  </label>
  <button id="setupBtn" class="bg-blue-500 text-white px-2 py-1 rounded">Aloita</button>
  <input type="file" id="fileInput" accept="application/json" class="hidden">
  <button id="importBtn" class="bg-gray-500 text-white px-2 py-1 rounded">Tuo JSON</button>
</section>
<section id="game" class="hidden space-y-2">
  <div class="flex justify-between">
    <span>Peli <span id="gameNum"></span></span>
    <span>Jakaja: <span id="dealer" class="font-bold"></span></span>
  </div>
  <table class="min-w-full text-center bg-white">
    <thead id="head"></thead>
    <tbody id="roundBody"></tbody>
    <tfoot><tr id="totalRow" class="font-bold"></tr></tfoot>
  </table>
  <div id="inputs" class="flex flex-wrap gap-2"></div>
  <button id="addRound" class="bg-green-500 text-white px-2 py-1 rounded">Lisää Kierros</button>
  <div id="msg" aria-live="polite" class="text-red-600"></div>
  <canvas id="lineChart" class="w-full h-40"></canvas>
  <button id="newGame" class="bg-yellow-500 text-white px-2 py-1 rounded hidden">Uusi Peli</button>
</section>
<section class="space-x-2">
  <button id="exportBtn" class="bg-blue-700 text-white px-2 py-1 rounded">Vie JSON</button>
  <button id="statsBtn" class="bg-gray-700 text-white px-2 py-1 rounded">Tilastot</button>
</section>
<section id="stats" class="hidden space-y-2">
  <div class="flex flex-wrap gap-2">
    <input type="date" id="dateStart" class="border p-1">
    <input type="date" id="dateEnd" class="border p-1">
    <select id="playerFilter" multiple class="border p-1 flex-1"></select>
    <button id="applyFilter" class="bg-blue-500 text-white px-2 py-1 rounded">Suodata</button>
  </div>
  <table id="winTable" class="min-w-full text-center bg-white"></table>
  <canvas id="winChart" class="w-full h-40"></canvas>
  <p id="streak"></p>
  <p id="hiLo"></p>
  <div id="gameList"></div>
  <button id="closeStats" class="bg-gray-500 text-white px-2 py-1 rounded">Sulje</button>
</section>
<script type="module">
const el = id => document.getElementById(id);
const state = JSON.parse(localStorage.getItem('uno') || '{"players":[],"games":[]}');
let cur = null;
let chart = null;
let winChart = null;
const save = () => localStorage.setItem('uno', JSON.stringify(state));
function renderGame(){
  el('setup').classList.add('hidden');
  el('game').classList.remove('hidden');
  el('gameNum').textContent = cur.gameNumber;
  el('dealer').textContent = cur.startingPlayer;
  el('head').innerHTML = '<tr><th>Kierros</th>' + state.players.map(p=>`<th>${p}</th>`).join('') + '</tr>';
  el('roundBody').innerHTML = cur.rounds.map((r,i)=>'<tr><td>'+ (i+1) +'</td>'+r.scores.map(s=>`<td class="'+(s===0?'bg-green-100':'')+'">'+s+'</td>`).join('')+'</tr>').join('');
  el('inputs').innerHTML = state.players.map((p,i)=>`<input type="number" id="s${i}" class="score border w-16 p-1" placeholder="${p}">`).join('');
  el('totalRow').innerHTML = '<td>Yhteensä</td>' + cur.totals.map(t=>`<td>${t}</td>`).join('');
}
function startGame(){
  const num = state.games.reduce((m,g)=>Math.max(m,g.gameNumber),0)+1;
  const idx = cur ? (cur.startingPlayerIndex+1)%state.players.length : 0;
  cur = {gameNumber:num,startingPlayer:state.players[idx],startingPlayerIndex:idx,rounds:[],totals:Array(state.players.length).fill(0),winner:null,endedAt:null};
  if(!chart){
    chart = new Chart(el('lineChart'),{type:'line',data:{labels:[],datasets:state.players.map(p=>({label:p,data:[]}))},options:{responsive:true}});
  }else{
    chart.data.labels=[];chart.data.datasets.forEach(d=>d.data=[]);chart.update();
  }
  renderGame();
  save();
}
el('setupBtn').onclick = () => {
  const names = el('names').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(names.length<2) return alert('Anna vähintään kaksi nimeä');
  state.players = names;
  startGame();
  el('playerFilter').innerHTML = names.map(p=>`<option selected>${p}</option>`).join('');
};
el('addRound').onclick = () => {
  const scores = state.players.map((_,i)=>parseInt(el('s'+i).value,10));
  if(scores.some(isNaN)) return el('msg').textContent='Syötä pisteet kaikille';
  const zero = scores.reduce((a,s,i)=>s===0?(a.idx=i,a.count+1):a.count,{count:0,idx:-1});
  if(zero.count!==1) return el('msg').textContent='Yhdellä pelaajalla pitää olla 0';
  cur.rounds.push({scores,wentOut:state.players[zero.idx]});
  cur.totals = scores.map((s,i)=>cur.totals[i]+s);
  cur.startingPlayerIndex = (cur.startingPlayerIndex+1)%state.players.length;
  cur.startingPlayer = state.players[cur.startingPlayerIndex];
  chart.data.labels.push(cur.rounds.length);
  chart.data.datasets.forEach((d,i)=>d.data.push(cur.totals[i]));
  chart.update();
  renderGame();
  if(Math.max(...cur.totals)>=500){
    const min = Math.min(...cur.totals);
    cur.winner = state.players[cur.totals.indexOf(min)];
    cur.endedAt = new Date().toISOString();
    state.games.push(cur);
    save();
    el('msg').innerHTML = `<span class="animate-pulse">Voittaja: ${cur.winner}</span>`;
    el('newGame').classList.remove('hidden');
  }
};
el('newGame').onclick = () => { el('newGame').classList.add('hidden'); startGame(); };
const download = (data,name) => {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
};
el('exportBtn').onclick = () => download(state,'uno-scores.json');
el('importBtn').onclick = () => el('fileInput').click();
el('fileInput').onchange = e => {
  const f = e.target.files[0];
  if(!f) return;
  if(state.games.length && !confirm('Poistetaanko nykyiset tiedot?')) return;
  const r = new FileReader();
  r.onload = ev => {
    try{
      const o = JSON.parse(ev.target.result);
      if(!Array.isArray(o.players) || !Array.isArray(o.games)) throw 0;
      state.players = o.players;
      state.games = o.games;
      save();
      startGame();
      el('playerFilter').innerHTML = o.players.map(p=>`<option selected>${p}</option>`).join('');
    }catch{ alert('Virheellinen tiedosto'); }
  };
  r.readAsText(f);
};
el('statsBtn').onclick = () => { renderStats(); el('stats').classList.toggle('hidden'); };
el('closeStats').onclick = () => el('stats').classList.add('hidden');
function renderStats(){
  const ds = el('dateStart').value;
  const de = el('dateEnd').value;
  const opts = [...el('playerFilter').options].filter(o=>o.selected).map(o=>o.value);
  const games = state.games.filter(g=>{
    const d = g.endedAt?g.endedAt.slice(0,10):'';
    return (!ds||d>=ds)&&(!de||d<=de)&&(opts.length===0||opts.some(p=>g.players.includes(p)));
  });
  const wins = {}, rounds = [];
  games.forEach(g=>{
    if(g.winner) wins[g.winner]=(wins[g.winner]||0)+1;
    g.rounds.forEach(r=>rounds.push(...r.scores));
  });
  el('winTable').innerHTML = '<tr>' + state.players.map(p=>`<th>${p}</th>`).join('') + '</tr><tr>' + state.players.map(p=>`<td>${wins[p]||0}</td>`).join('') + '</tr>';
  if(winChart) winChart.destroy();
  winChart = new Chart(el('winChart'),{type:'bar',data:{labels:Object.keys(wins),datasets:[{data:Object.values(wins),backgroundColor:'#60a5fa'}]},options:{plugins:{legend:{display:false}},responsive:true}});
  const st = calcStreak(games);
  el('streak').textContent = 'Pisin voittoputki: ' + (st.player||'') + ' ' + st.length;
  const hi = Math.max(...rounds), lo = Math.min(...rounds);
  el('hiLo').textContent = `Suurin kierros: ${hi} Pienin: ${lo}`;
  el('gameList').innerHTML = games.map(g=>`<details><summary>Peli ${g.gameNumber} - Voittaja ${g.winner}</summary><table class="min-w-full text-center mt-2">${g.rounds.map((r,i)=>'<tr><td>'+(i+1)+'</td>'+r.scores.map(s=>'<td class="'+(s===0?'bg-green-100':'')+'">'+s+'</td>').join('')+'</tr>').join('')}<tr class="font-bold"><td>Yht</td>`+g.totals.map(t=>'<td>'+t+'</td>').join('')+'</tr></table></details>`).join('');
}
function calcStreak(games){
  let last = null, len = 0, max = {player:null,length:0};
  games.forEach(g=>{
    if(g.winner===last){
      len++;
    }else{
      last=g.winner; len=1;
    }
    if(len>max.length) max={player:last,length:len};
  });
  return max;
}
(function(){
  if(state.players.length){
    startGame();
    el('playerFilter').innerHTML = state.players.map(p=>`<option selected>${p}</option>`).join('');
  }
})();
</script>
</body>
</html>
